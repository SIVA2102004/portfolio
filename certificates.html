<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Certificates | Portfolio</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="certs.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        .cert-page-container {
            max-width: 1000px;
            margin: 0 auto;
            padding: 4rem 2rem;
            min-height: 80vh;
        }

        .page-header {
            margin-bottom: 3rem;
            border-bottom: 1px solid var(--card-border);
            padding-bottom: 1rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .back-btn {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            color: var(--accent-color);
            font-size: 0.9rem;
        }

        .back-btn:hover {
            text-decoration: underline;
        }

        /* Reuse existing cert-category styles from certs.css, just ensure they are visible */
        .cert-category {
            display: block;
            /* Ensure visibility */
            margin-bottom: 2rem;
        }
    </style>
</head>

<body>
    <header>
        <nav>
            <div class="logo">JSSG</div>
            <ul class="nav-links">
                <li><a href="index.html">Home</a></li>
                <li><a href="certificates.html" class="active" style="color: var(--accent-color);">Certificates</a></li>
            </ul>
            <button id="theme-toggle" class="theme-toggle-btn" aria-label="Toggle Theme">
                <i class="fas fa-moon"></i>
            </button>
        </nav>
    </header>

    <main>
        <div class="cert-page-container">
            <div class="page-header">
                <h2>All Certificates</h2>
                <a href="index.html" class="back-btn"><i class="fas fa-arrow-left"></i> Back to Home</a>
            </div>

            <div id="full-cert-list">
                <!-- Content will be populated by script.js -->
            </div>
        </div>
    </main>

    <footer>
        <div class="container footer-content">
            <p>&copy; 2026 JSSG. All rights reserved.</p>
        </div>
    </footer>

    <script src="script.js"></script>
</body>

</html>
