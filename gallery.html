<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gallery | Portfolio</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        .gallery-page {
            max-width: 1200px;
            margin: 0 auto;
            padding: 100px 2rem 4rem;
            min-height: 80vh;
        }

        .gallery-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 3rem;
            border-bottom: 1px solid var(--card-border);
            padding-bottom: 1rem;
            flex-wrap: wrap;
            gap: 1rem;
        }

        .gallery-title {
            font-size: 2.5rem;
            color: var(--text-primary);
        }

        .upload-wrapper {
            position: relative;
        }

        #upload-input {
            width: 0.1px;
            height: 0.1px;
            opacity: 0;
            overflow: hidden;
            position: absolute;
            z-index: -1;
        }

        .upload-btn {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            cursor: pointer;
            padding: 0.8rem 1.5rem;
            background: var(--accent-color);
            color: #000;
            border-radius: 8px;
            font-weight: 600;
            transition: var(--transition);
        }

        .upload-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px var(--accent-glow);
        }

        .gallery-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
            gap: 1.5rem;
        }

        .gallery-item {
            border-radius: 12px;
            overflow: hidden;
            border: 1px solid var(--card-border);
            background: var(--card-bg);
            aspect-ratio: 1;
            position: relative;
            cursor: zoom-in;
            transition: var(--transition);
        }

        .gallery-item img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.4s ease;
        }

        .gallery-item:hover {
            border-color: var(--accent-color);
        }

        .gallery-item:hover img {
            transform: scale(1.05);
        }

        .gallery-item .delete-btn {
            position: absolute;
            top: 10px;
            right: 10px;
            background: rgba(255, 0, 0, 0.8);
            color: white;
            border: none;
            width: 30px;
            height: 30px;
            border-radius: 50%;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0;
            transition: var(--transition);
        }

        .gallery-item:hover .delete-btn {
            opacity: 1;
        }

        /* Empty State */
        .empty-gallery {
            text-align: center;
            padding: 4rem;
            color: var(--text-secondary);
            grid-column: 1 / -1;
            border: 2px dashed var(--card-border);
            border-radius: 12px;
        }

        .empty-gallery i {
            font-size: 3rem;
            margin-bottom: 1rem;
            opacity: 0.5;
        }
    </style>
</head>

<body>
    <header>
        <nav>
            <div class="nav-brand" onclick="location.href='index.html'">
                <div class="logo-circle logo-dark">JSSG</div>
                <div class="logo-circle logo-light">
                    <img src="profile.jpg" alt="Profile">
                </div>
            </div>
            <div class="nav-actions">
                <ul class="nav-links">
                    <li><a href="index.html">Home</a></li>
                    <li><a href="index.html#about">About</a></li>
                    <li><a href="gallery.html" class="active">Gallery</a></li>
                    <li><a href="certificates.html">Certificates</a></li>
                </ul>
                <button id="theme-toggle" class="theme-toggle-btn" aria-label="Toggle Theme">
                    <i class="fas fa-moon"></i>
                </button>
                <div class="burger">
                    <div class="line1"></div>
                    <div class="line2"></div>
                    <div class="line3"></div>
                </div>
            </div>
        </nav>
    </header>

    <main>
        <div class="gallery-page">
            <div class="gallery-header">
                <h1 class="gallery-title">My Gallery</h1>
            </div>

            <div class="gallery-grid" id="gallery-grid">
                <!-- Pre-filled photos -->
                <div class="gallery-item">
                    <img src="profile.jpg" alt="Profile Photo">
                </div>
                <!-- Dynamic photos will be added here -->
            </div>
        </div>
    </main>

    <footer>
        <div class="container footer-content">
            <p>&copy; 2026 JSSG. All rights reserved.</p>
        </div>
    </footer>

    <script src="script.js"></script>
    <script>
        // Static Gallery Layout
        const galleryGrid = document.getElementById('gallery-grid');
    </script>
</body>
</html>
